name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backend-artifact:
    name: Backend artifact
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Check Docker availability
        run: docker version

      - name: Package backend
        run: mvn -B -f backend/pom.xml package

      - name: Upload backend jar
        uses: actions/upload-artifact@v7
        with:
          name: creatorspace-backend-jar
          path: backend/target/*.jar
          if-no-files-found: error
          retention-days: 14

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-package-test-reports
          path: backend/target/surefire-reports
          if-no-files-found: ignore
          retention-days: 14

  frontend-artifact:
    name: Frontend artifact
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend --registry=https://registry.npmjs.org/

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: creatorspace-frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 14

  delivery-summary:
    name: Delivery summary
    runs-on: ubuntu-24.04
    needs:
      - backend-artifact
      - frontend-artifact
    timeout-minutes: 5

    steps:
      - name: Write delivery summary
        run: |
          {
            echo "## CreatorSpace delivery bundle"
            echo ""
            echo "- Ref: ${GITHUB_REF}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Backend artifact: creatorspace-backend-jar"
            echo "- Frontend artifact: creatorspace-frontend-dist"
            echo ""
            echo "Docker deployment assets are available in docker-compose.yml and docs/deployment/docker.md."
            echo "Remote server auto-deployment is intentionally not configured yet."
          } | tee deployment-summary.md

      - name: Upload delivery summary
        uses: actions/upload-artifact@v7
        with:
          name: creatorspace-delivery-summary
          path: deployment-summary.md
          if-no-files-found: error
          retention-days: 14
