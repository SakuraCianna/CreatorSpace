name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - codex/CreatorSpace
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Check Docker availability
        run: docker version

      - name: Run Maven tests
        run: mvn -B -f backend/pom.xml test

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports
          if-no-files-found: ignore
          retention-days: 7

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend --registry=https://registry.npmjs.org/

      - name: Audit frontend dependencies
        run: npm audit --prefix frontend --registry=https://registry.npmjs.org/ --audit-level=high

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 7
