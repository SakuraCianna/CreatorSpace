logging:
  level:
    org.springframework.security: DEBUG

spring:
  application:
    name: CreatorSpace
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  config:
    import:
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:5432}/${POSTGRES_DB:creatorspace}
    username: ${POSTGRES_USERNAME:creatorspace}
    password: ${POSTGRES_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    placeholders:
      adminUsername: ${ADMIN_USERNAME:admin}
      adminPasswordHash: ${ADMIN_PASSWORD_HASH}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:1s}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:1s}
  servlet:
    multipart:
      enabled: true
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:${UPLOAD_MAX_FILE_SIZE_MB:20}MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:${UPLOAD_MAX_REQUEST_SIZE_MB:50}MB}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

app:
  env: ${APP_ENV:local}
  web-base-url: ${WEB_BASE_URL:http://localhost:5173}
  api-base-url: ${API_BASE_URL:http://localhost:8080}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  storage:
    type: ${FILE_STORAGE_TYPE:local}
    local-root: ${LOCAL_FILE_STORAGE_ROOT:storage/uploads}
    public-prefix: ${LOCAL_FILE_PUBLIC_PREFIX:/uploads}
  security:
    jwt-secret: ${JWT_SECRET:}
    password-bcrypt-strength: ${PASSWORD_BCRYPT_STRENGTH:12}
    jwt-access-token-expire-minutes: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:120}
    jwt-refresh-token-expire-days: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:14}
    hcaptcha-secret-key: ${HCAPTCHA_SECRET_KEY:}
  ai:
    enabled: ${AI_ENABLED:false}
    provider: ${AI_PROVIDER:zhipu}
    zhipu-api-base-url: "${ZHIPU_API_BASE_URL:https://open.bigmodel.cn/api/paas/v4}"
    zhipu-api-key: ${ZHIPU_API_KEY:}
    zhipu-model: ${ZHIPU_MODEL:${ZHIPU_MULTIMODAL_MODEL:glm-4.6v-flash}}
    request-timeout-seconds: ${ZHIPU_REQUEST_TIMEOUT_SECONDS:60}
    max-output-tokens: ${ZHIPU_MAX_OUTPUT_TOKENS:4096}
    thinking-enabled: ${ZHIPU_THINKING_ENABLED:false}
